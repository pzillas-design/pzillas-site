<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PIX Content Viewer</title>
<style>
*,*::before,*::after{box-sizing:border-box}
body{margin:0;background:#070707;color:#f5f5f5;font:14px/1.45 "Helvetica Neue",Arial,sans-serif}
button,input,textarea{font:inherit}
.app{min-height:100vh;display:grid;grid-template-columns:310px 1fr}
aside{position:sticky;top:0;height:100vh;padding:24px;border-right:1px solid rgba(255,255,255,.1);background:#0a0a0a}
h1{margin:0 0 12px;font-size:17px;letter-spacing:.18em;text-transform:uppercase}
.muted{color:rgba(255,255,255,.52)}
.actions{display:flex;flex-direction:column;gap:10px;margin:22px 0}
.btn{display:inline-flex;justify-content:center;align-items:center;min-height:40px;border:1px solid rgba(255,255,255,.16);border-radius:999px;background:#111;color:#fff;text-decoration:none;padding:9px 14px;cursor:pointer}
.btn:hover,.btn.active{background:#fff;color:#000}
.tabs{display:flex;gap:8px;margin:20px 0 0}
.tab{opacity:.62}
main{padding:24px}
.top{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;margin-bottom:22px}
.stats{display:flex;gap:8px;flex-wrap:wrap}
.pill{border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:7px 10px;color:rgba(255,255,255,.66);font-size:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.card{border:1px solid rgba(255,255,255,.1);border-radius:20px;background:rgba(255,255,255,.035);overflow:hidden}
.hero{aspect-ratio:3/2;background:#121212 center/cover no-repeat;position:relative}
.slot{position:absolute;left:12px;top:12px;border-radius:999px;background:rgba(0,0,0,.62);padding:6px 9px;font-size:11px;letter-spacing:.12em;text-transform:uppercase}
.slides{position:absolute;right:12px;bottom:12px;display:flex;gap:4px}
.slides span{width:18px;height:3px;border-radius:999px;background:rgba(255,255,255,.28)}
.slides span:first-child{background:#fff}
.body{padding:16px}
.kicker{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.45)}
h2{margin:5px 0 8px;font-size:26px;line-height:.98;letter-spacing:-.04em}
p{margin:0}
.meta{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:14px}
.meta div{border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:8px;color:rgba(255,255,255,.58);font-size:12px}
.paths{margin-top:12px;display:flex;flex-direction:column;gap:5px}
code{font:11px/1.4 ui-monospace,SFMono-Regular,Menlo,monospace;color:rgba(255,255,255,.52);word-break:break-all}
textarea{width:100%;min-height:140px;margin-top:12px;border:1px solid rgba(255,255,255,.12);border-radius:14px;background:#050505;color:#fff;padding:12px;resize:vertical}
.status{min-height:22px;margin-top:10px;color:rgba(255,255,255,.5)}
.file{display:none}
@media(max-width:880px){.app{grid-template-columns:1fr}aside{position:relative;height:auto}.top{flex-direction:column}}
</style>
</head>
<body>
<div class="app">
  <aside>
    <h1>Content Viewer</h1>
    <p class="muted">Visuelle Ansicht für <code>content-projects.json</code>. Änderungen machst du nicht hier final, sondern du sagst mir danach die gewünschten Anpassungen.</p>
    <div class="actions">
      <a class="btn" href="./content-projects.json">JSON öffnen</a>
      <button class="btn" id="copy-summary">Änderungsnotiz kopieren</button>
      <button class="btn" id="choose-json">JSON-Datei auswählen</button>
      <input class="file" id="file" type="file" accept="application/json,.json">
      <a class="btn" href="./prototype-v30.html">V30 ansehen</a>
    </div>
    <div class="tabs">
      <button class="btn tab active" data-world="foto">Foto</button>
      <button class="btn tab" data-world="uxui">UX</button>
    </div>
    <textarea id="note" placeholder="Notiz an Codex, z.B.: Foto Slot 6: Titel zu 'Aerial Story' ändern, zweites Bild entfernen, Copy länger machen."></textarea>
    <div class="status" id="status"></div>
  </aside>
  <main>
    <div class="top">
      <div>
        <h1 id="headline">Foto</h1>
        <p class="muted">Slots mit mehreren Bildern wechseln später automatisch. `Übersicht` markiert die drei Kacheln im Overview.</p>
      </div>
      <div class="stats" id="stats"></div>
    </div>
    <div class="grid" id="grid"></div>
  </main>
</div>

<script>
let content = null;
let activeWorld = 'foto';
const grid = document.getElementById('grid');
const stats = document.getElementById('stats');
const statusEl = document.getElementById('status');
const headline = document.getElementById('headline');

function assetUrl(path) {
  if (!path) return '';
  if (/^(file:|https?:|\.{0,2}\/|\/)/.test(path)) return path;
  return encodeURI(`../${path}`);
}

function esc(v) {
  return String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}

async function loadDefault() {
  try {
    const res = await fetch('./content-projects.json', {cache:'no-store'});
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    content = await res.json();
    statusEl.textContent = 'JSON geladen.';
  } catch (err) {
    statusEl.textContent = 'JSON konnte per file:// nicht automatisch geladen werden. Bitte "JSON-Datei auswählen" nutzen.';
  }
  render();
}

function render() {
  if (!content) {
    grid.innerHTML = '<p class="muted">Noch keine JSON-Daten geladen.</p>';
    stats.innerHTML = '';
    return;
  }
  const world = content.worlds?.[activeWorld];
  const slots = world?.slots || [];
  headline.textContent = world?.label || activeWorld;
  const overviewCount = slots.filter(s => s.strip).length;
  const slideCount = slots.reduce((sum, s) => sum + (s.slides?.length || 0), 0);
  stats.innerHTML = [
    `${slots.length} Slots`,
    `${overviewCount} Übersicht`,
    `${slideCount} Bilder`,
    `${slots.filter(s => (s.slides?.length || 0) > 1).length} Auto-Wechsel`
  ].map(v => `<span class="pill">${v}</span>`).join('');
  grid.innerHTML = slots.map((slot, idx) => renderCard(slot, idx)).join('');
}

function renderCard(slot, idx) {
  const slides = slot.slides || [];
  return `
    <article class="card">
      <div class="hero" style="background-image:url('${assetUrl(slides[0])}')">
        <div class="slot">Slot ${idx + 1}</div>
        <div class="slides">${slides.map(() => '<span></span>').join('')}</div>
      </div>
      <div class="body">
        <div class="kicker">${esc(slot.category)}</div>
        <h2>${esc(slot.title)}</h2>
        <p class="muted">${esc(slot.body)}</p>
        <div class="meta">
          <div>col<br><strong>${esc(slot.col)}</strong></div>
          <div>row<br><strong>${esc(slot.row || 0)}</strong></div>
          <div>${slot.strip ? 'Übersicht' : 'Innenwelt'}<br><strong>${slides.length > 1 ? 'Auto' : 'Statisch'}</strong></div>
        </div>
        <div class="paths">${slides.map(src => `<code>${esc(src)}</code>`).join('')}</div>
      </div>
    </article>
  `;
}

document.querySelectorAll('[data-world]').forEach(btn => {
  btn.addEventListener('click', () => {
    activeWorld = btn.dataset.world;
    document.querySelectorAll('[data-world]').forEach(item => item.classList.toggle('active', item === btn));
    render();
  });
});

document.getElementById('choose-json').addEventListener('click', () => document.getElementById('file').click());
document.getElementById('file').addEventListener('change', async event => {
  const file = event.target.files?.[0];
  if (!file) return;
  content = JSON.parse(await file.text());
  statusEl.textContent = `${file.name} geladen.`;
  render();
});

document.getElementById('copy-summary').addEventListener('click', async () => {
  const note = document.getElementById('note').value.trim();
  const msg = note || `Bitte ${activeWorld} in content-projects.json anpassen.`;
  await navigator.clipboard?.writeText(msg);
  statusEl.textContent = 'Notiz kopiert.';
});

loadDefault();
</script>
</body>
</html>
